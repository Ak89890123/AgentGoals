name: package

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test]"
      - run: python -m pytest
      - run: agentgoals --version
      - run: agentgoals doctor --json
      - run: goal-lifecycle --version

  package-cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/verify_package_artifacts.py --dist-dir dist
      - run: python scripts/package_smoke.py --dist-dir dist --artifact wheel --venv-dir .wheel-smoke
      - run: python scripts/package_smoke.py --dist-dir dist --artifact sdist --venv-dir .sdist-smoke

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip build twine pipx uv
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/verify_package_artifacts.py --dist-dir dist
      - name: Install sdist in a disposable environment
        run: |
          python -m venv .sdist-smoke
          .sdist-smoke/bin/python -m pip install dist/*.tar.gz
          .sdist-smoke/bin/agentgoals --version
          .sdist-smoke/bin/agentgoals doctor --json
          .sdist-smoke/bin/goal-lifecycle --version
      - run: pipx install dist/*.whl
      - run: agentgoals --version
      - run: agentgoals doctor --json
      - run: goal-lifecycle --version
      - run: pipx uninstall agentgoals
      - run: uv tool install dist/*.whl
      - run: agentgoals --version
      - run: agentgoals doctor --json
      - run: goal-lifecycle --version
